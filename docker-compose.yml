version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fast_shop_junior_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fast_shop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_junior_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fast_shop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: fast_shop_junior_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fast_shop_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_junior_data: